<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería | Flores Eternas</title>

<link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">

<style>

/* VARIABLES */
:root{
--rosa:#e91e63;
--oscuro:#2b2b2b;
}

/* BODY */
body{
background: linear-gradient(135deg, #fff0f5, #f8bbd0);
font-family: Arial, sans-serif;
padding-top:80px;
}

/* NAVBAR */
.navbar-custom{
background: rgba(255,255,255,0.7);
backdrop-filter: blur(10px);
padding: 12px 0;
}

.navbar-custom .nav-link{
color: var(--oscuro);
margin:0 10px;
position: relative;
}

.navbar-custom .nav-link::after{
content:"";
position:absolute;
width:0%;
height:2px;
background: var(--rosa);
left:0;
bottom:0;
transition:0.3s;
}

.navbar-custom .nav-link:hover{
color: var(--rosa);
}

.navbar-custom .nav-link:hover::after{
width:100%;
}

/* TITULO */
.titulo{
color:var(--rosa);
font-weight:bold;
}

/* GALERIA */
.galeria{
padding:80px 0;
}

.card-img{
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:0.4s;
}

.card-img img{
width:100%;
height:100%;
object-fit:cover;
transition:0.4s;
}

/* EFECTO HOVER */
.card-img:hover img{
transform: scale(1.1);
}

/* BOTON */
.btn-contacto{
background: linear-gradient(45deg, var(--rosa), #ff80ab);
color:#fff;
border-radius:30px;
padding:8px 20px;
border:none;
}

</style>
</head>

<body>
